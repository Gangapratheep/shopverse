# Kops-specific overrides for deploying to kops clusters

# Enable ingress for kops-managed cluster. Set your hostname below.
ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # If you use TLS via traefik, set the following and adjust certresolver
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls: "true"

# Set the host to your domain for the frontend/backend ingress
frontend:
  ingressHost: shopverse.example.com
  # imagePullSecrets should reference a Kubernetes secret existing in the cluster
  imagePullSecrets:
    - ecr-registry-secret

backend:
  ingressHost: api.shopverse.example.com
  imagePullSecrets:
    - ecr-registry-secret

mysql:
  # Ensure this storageClass exists in your kops cluster (gp2 is common on AWS)
  storageClass: gp2
  storage: 10Gi

# Tune replicas/resources for kops nodes
frontend:
  replicas: 2
backend:
  replicas: 2

# Optionally override images here if you do not want CI to update values.yaml
# frontend:
#   image: "123456789012.dkr.ecr.us-east-1.amazonaws.com/shopverse-frontend:latest"
# backend:
#   image: "123456789012.dkr.ecr.us-east-1.amazonaws.com/shopverse-backend:latest"

# Kops-specific overrides for deploying to kops clusters

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # If you use TLS via traefik, set the following and adjust certresolver
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: myresolver

frontend:
  ingressHost: shopverse.gangadevops.site
  replicas: 2
  imagePullSecrets:
    - ecr-registry-secret

backend:
  ingressHost: shopverse-api.gangadevops.site
  replicas: 2
  imagePullSecrets:
    - ecr-registry-secret

mysql:
  # Ensure this storageClass exists in your kops cluster (gp2 is common on AWS)
  storageClass: gp2
  storage: 10Gi

istio:
  ingressHost: istio.gangadevops.site
  replicas: 1
  imagePullSecrets: []
  serviceName: istio-ingressgateway
  servicePort: 443
  ingressName: istio-ingress

kiali:
  ingressHost: kiali.gangadevops.site
  replicas: 1
  imagePullSecrets: []
  serviceName: kiali
  servicePort: 20001
  ingressName: kiali-ingress


# Optionally override images here if you do not want CI to update values.yaml
# frontend:
#   image: "123456789012.dkr.ecr.us-east-1.amazonaws.com/shopverse-frontend:latest"
# backend:
#   image: "123456789012.dkr.ecr.us-east-1.amazonaws.com/shopverse-backend:latest"

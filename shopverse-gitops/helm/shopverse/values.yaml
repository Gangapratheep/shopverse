# ──────────────────────────────────────
# Frontend
# ──────────────────────────────────────
frontend:
  deploymentName: shopverse-frontend
  replicas: 2
  image: "295493126166.dkr.ecr.ap-south-1.amazonaws.com/shopverse-frontend:a40110ca13fe9ea586fe7394d8dbb3bc7dbff2aa" # frontend-image
  imagePullSecrets: []
  serviceName: shopverse-frontend-svc
  servicePort: 80
  ingressName: shopverse-frontend-ingress
  ingressHost: ""

# ──────────────────────────────────────
# Backend
# ──────────────────────────────────────
backend:
  deploymentName: shopverse-backend
  replicas: 2
  image: "295493126166.dkr.ecr.ap-south-1.amazonaws.com/shopverse-backend:a40110ca13fe9ea586fe7394d8dbb3bc7dbff2aa" # backend-image
  imagePullSecrets: []
  serviceName: shopverse-backend-svc
  servicePort: 8080
  ingressName: shopverse-backend-ingress
  ingressHost: ""

# ──────────────────────────────────────
# MySQL
# ──────────────────────────────────────
mysql:
  database: shopverse
  user: shopverse
  rootPassword: ""
  password: ""
  storage: 5Gi
  storageClass: gp2
  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "250m"

# ──────────────────────────────────────
# Shared
# ──────────────────────────────────────
ingress:
  enabled: false
  ingressClassName: traefik
  annotations: {}

jwtSecret: ""

name: ShopVerse CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ======================================================
  # Stage 1 : Test
  # ------------------------------------------------------
  # Purpose:
  # - Run backend Go tests
  # - Run frontend lint checks
  # - Lint Helm charts
  # ------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      # Install Helm CLI
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      # Ensure go.sum is tidy
      - name: Update go.sum
        working-directory: ./backend
        run: go mod tidy

      # Run backend unit tests
      - name: Run Go tests
        working-directory: ./backend
        run: go test ./...

      # Setup Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      # Run frontend lint checks
      - name: Run frontend lint
        working-directory: ./frontend
        run: npx eslint . --ext js,jsx --report-unused-disable-directives --max-warnings 0 --config .eslintrc.cjs

      # Lint Helm chart
      - name: Lint Helm chart
        run: |
          helm lint shopverse-gitops/helm/shopverse \
            -f shopverse-gitops/helm/shopverse/values.yaml \
            -f shopverse-gitops/helm/shopverse/values.kops.yaml

  # ======================================================
  # Stage 2 : Security Scan
  # ------------------------------------------------------
  # Purpose:
  # - Build temporary Docker images
  # - Scan them with Trivy for CRITICAL vulnerabilities
  # ------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      # Build frontend image for scanning
      - name: Build frontend image
        run: docker build -t shopverse-frontend:scan ./frontend

      # Build backend image for scanning
      - name: Build backend image
        run: docker build -t shopverse-backend:scan ./backend

      # Install Trivy vulnerability scanner
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -q
          sudo apt-get install -y trivy

      # Run Trivy scan on frontend image
      - name: Run Trivy scan on frontend
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --format table \
            shopverse-frontend:scan

      # Run Trivy scan on backend image
      - name: Run Trivy scan on backend
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --format table \
            shopverse-backend:scan

  # ======================================================
  # Stage 3 : Build & Push Docker Images
  # ------------------------------------------------------
  # Purpose:
  # - Build production-ready Docker images
  # - Push them to Amazon ECR
  # ------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: security-scan
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
    steps:
      - uses: actions/checkout@v4

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Ensure ECR repositories exist
      - name: Ensure ECR repositories exist
        run: |
          for repo in shopverse-frontend shopverse-backend; do
            aws ecr describe-repositories \
              --repository-names "$repo" \
              --region "$AWS_REGION" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name "$repo" \
              --region "$AWS_REGION"
          done

      # Build frontend image
      - name: Build frontend image
        run: |
          docker build \
            -t "$ECR_REGISTRY/shopverse-frontend:${{ github.sha }}" \
            -t "$ECR_REGISTRY/shopverse-frontend:latest" \
            ./frontend

      # Build backend image
      - name: Build backend image
        run: |
          docker build \
            -t "$ECR_REGISTRY/shopverse-backend:${{ github.sha }}" \
            -t "$ECR_REGISTRY/shopverse-backend:latest" \
            ./backend

      # Push frontend image
      - name: Push frontend image
        run: |
          docker push "$ECR_REGISTRY/shopverse-frontend:${{ github.sha }}"
          docker push "$ECR_REGISTRY/shopverse-frontend:latest"

      # Push backend image
      - name: Push backend image
        run: |
          docker push "$ECR_REGISTRY/shopverse-backend:${{ github.sha }}"
          docker push "$ECR_REGISTRY/shopverse-backend:latest"

  # ======================================================
  # Stage 4 : Update GitOps Repository
  # ------------------------------------------------------
  # Purpose:
  # - Update Helm values.yaml with new image tags
  # - Commit & push changes to GitHub
  # - Argo CD will detect changes and sync automatically
  # ------------------------------------------------------
  update-gitops:
    name: Update GitOps Repository
    runs-on: ubuntu-latest
    needs: build-and-push   # <-- Ensures Stage 4 runs only after Stage 3
    permissions:
      contents: write
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install yq for YAML editing
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # Update frontend image tag in values.yaml
      - name: Update frontend image
        run: |
          yq -i '.frontend.image = "'"$ECR_REGISTRY"'/shopverse-frontend:'"$IMAGE_TAG"'"' shopverse-gitops/helm/shopverse/values.yaml

      # Update backend image tag in values.yaml
      - name: Update backend image
        run: |
          yq -i '.backend.image = "'"$ECR_REGISTRY"'/shopverse-backend:'"$IMAGE_TAG"'"' shopverse-gitops/helm/shopverse/values.yaml

      # Commit and push changes
      - name: Commit
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add shopverse-gitops/helm/shopverse/values.yaml
          git diff --cached --quiet || git commit -m "Update image tags"
          git push origin main

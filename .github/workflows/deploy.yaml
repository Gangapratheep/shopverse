name: ShopVerse CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Update go.sum
        working-directory: ./backend
        run: go mod tidy

      - name: Run Go tests
        working-directory: ./backend
        run: go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run frontend lint
        working-directory: ./frontend
        run: npx eslint . --ext js,jsx --report-unused-disable-directives --max-warnings 0 --config .eslintrc.cjs

      - name: Lint Helm chart
        run: |
          helm lint shopverse-gitops/helm/shopverse \
            -f shopverse-gitops/helm/shopverse/values.yaml \
            -f shopverse-gitops/helm/shopverse/values.kops.yaml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t shopverse-frontend:scan ./frontend

      - name: Build backend image
        run: docker build -t shopverse-backend:scan ./backend

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -q
          sudo apt-get install -y trivy

      - name: Run Trivy scan on frontend
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --format table \
            shopverse-frontend:scan

      - name: Run Trivy scan on backend
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --format table \
            shopverse-backend:scan

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: security-scan

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          for repo in shopverse-frontend shopverse-backend; do
            aws ecr describe-repositories \
              --repository-names "$repo" \
              --region "$AWS_REGION" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name "$repo" \
              --region "$AWS_REGION"
          done

      - name: Build frontend image
        run: |
          docker build \
            -t "$ECR_REGISTRY/shopverse-frontend:${{ github.sha }}" \
            -t "$ECR_REGISTRY/shopverse-frontend:latest" \
            ./frontend

      - name: Build backend image
        run: |
          docker build \
            -t "$ECR_REGISTRY/shopverse-backend:${{ github.sha }}" \
            -t "$ECR_REGISTRY/shopverse-backend:latest" \
            ./backend

      - name: Push frontend image
        run: |
          docker push "$ECR_REGISTRY/shopverse-frontend:${{ github.sha }}"
          docker push "$ECR_REGISTRY/shopverse-frontend:latest"

      - name: Push backend image
        run: |
          docker push "$ECR_REGISTRY/shopverse-backend:${{ github.sha }}"
          docker push "$ECR_REGISTRY/shopverse-backend:latest"
# ======================================================
# Stage 4 : Update GitOps Repository
#
# Purpose:
# ------------------------------------------------------
# This stage implements the GitOps deployment model.
#
# GitHub Actions DOES NOT deploy anything to Kubernetes.
#
# Instead it performs the following:
#
# 1. Checkout the latest source code
# 2. Update the Helm values.yaml with the new Docker images
# 3. Commit the updated Helm values
# 4. Push the changes back to GitHub
#
# Argo CD continuously watches this repository.
#
# Once this commit is pushed,
# Argo CD automatically detects the change,
# synchronizes the cluster,
# downloads the latest Docker images from Amazon ECR,
# and updates the Kubernetes deployment.
#
# CI  = GitHub Actions
# CD  = Argo CD
#
# No kubectl commands.
# No helm upgrade commands.
#
# This follows the GitOps best practice.
# ======================================================
  update-gitops:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update frontend image
        run: |
          yq -i '.frontend.image = "'"$ECR_REGISTRY"'/shopverse-frontend:'"$IMAGE_TAG"'"' shopverse-gitops/helm/shopverse/values.yaml

      - name: Update backend image
        run: |
          yq -i '.backend.image = "'"$ECR_REGISTRY"'/shopverse-backend:'"$IMAGE_TAG"'"' shopverse-gitops/helm/shopverse/values.yaml

      - name: Commit
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add shopverse-gitops/helm/shopverse/values.yaml
          git diff --cached --quiet || git commit -m "Update image tags"
          git push origin main

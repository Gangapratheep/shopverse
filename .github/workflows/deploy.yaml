name: ShopVerse CI/CD

on:
  push:
    branches:
      - main

jobs:
  # ======================================================
  # Stage 1 : Test
  #
  # Purpose:
  # Verify that both frontend and backend code are healthy
  # before proceeding to the next CI stages.
  #
  # This stage performs:
  # 1. Checkout source code
  # 2. Setup Go environment
  # 3. Download Go dependencies
  # 4. Run backend unit tests
  # 5. Setup Node.js
  # 6. Install frontend dependencies
  # 7. Run ESLint for frontend code quality
  #
  # If any step fails, the pipeline stops here.
  # ======================================================

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      # Checkout latest source code
      - uses: actions/checkout@v4

      # Install Go runtime
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      # Download backend dependencies
      - name: Update go.sum
        working-directory: ./backend
        run: go mod tidy

      # Run backend unit tests
      - name: Run Go tests
        working-directory: ./backend
        run: go test ./...

      # Install Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      # Run ESLint
      - name: Run frontend lint
        working-directory: ./frontend
        run: npx eslint . --ext js,jsx --report-unused-disable-directives --max-warnings 0 --config .eslintrc.cjs
  # ======================================================
  # Stage 2 : Security Scan
  #
  # Purpose:
  # ----------
  # Scan the application Docker images for known security
  # vulnerabilities before publishing them to Amazon ECR.
  #
  # This stage performs:
  #
  # 1. Checkout the latest source code
  # 2. Build temporary frontend Docker image
  # 3. Build temporary backend Docker image
  # 4. Install Trivy vulnerability scanner
  # 5. Scan frontend image for CRITICAL vulnerabilities
  # 6. Scan backend image for CRITICAL vulnerabilities
  #
  # If any CRITICAL vulnerability is found,
  # the pipeline stops and the images will NOT
  # be pushed to Amazon ECR.
  #
  # Note:
  # Temporary images are built only for scanning
  # and are NOT pushed to the container registry.
  # ======================================================

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    # Execute this stage only after Stage 1 (Test) succeeds
    needs: test

    steps:
      # --------------------------------------------
      # Checkout the latest application source code
      # --------------------------------------------
      - uses: actions/checkout@v4

      # --------------------------------------------
      # Build temporary frontend Docker image
      # used only for vulnerability scanning.
      # --------------------------------------------
      - name: Build frontend image
        run: docker build -t shopverse-frontend:scan ./frontend

      # --------------------------------------------
      # Build temporary backend Docker image
      # used only for vulnerability scanning.
      # --------------------------------------------
      - name: Build backend image
        run: docker build -t shopverse-backend:scan ./backend

      # --------------------------------------------
      # Install Trivy vulnerability scanner
      # --------------------------------------------
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -q
          sudo apt-get install -y trivy

      # --------------------------------------------
      # Scan frontend Docker image
      #
      # Fail the pipeline if any CRITICAL
      # vulnerability is detected.
      # --------------------------------------------
      - name: Run Trivy scan on frontend
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --format table \
            shopverse-frontend:scan

      # --------------------------------------------
      # Scan backend Docker image
      #
      # Fail the pipeline if any CRITICAL
      # vulnerability is detected.
      # --------------------------------------------
      - name: Run Trivy scan on backend
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --format table \
            shopverse-backend:scan
  # ======================================================
  # Stage 3 : Build & Push Docker Images
  #
  # Purpose:
  # ----------
  # Build production Docker images and push them to
  # Amazon Elastic Container Registry (ECR).
  #
  # This stage performs:
  #
  # 1. Checkout latest source code
  # 2. Configure AWS credentials
  # 3. Login to Amazon ECR
  # 4. Create ECR repositories (if they don't exist)
  # 5. Build frontend Docker image
  # 6. Build backend Docker image
  # 7. Tag images with:
  #      - Git Commit SHA
  #      - latest
  # 8. Push frontend image
  # 9. Push backend image
  #
  # Note:
  # Helm chart is NOT pushed here.
  # Argo CD will deploy using the GitOps repository.
  # ======================================================

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    needs: security-scan

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

    steps:
      # Checkout latest source code
      - uses: actions/checkout@v4

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Create repositories if they don't exist
      - name: Ensure ECR repositories exist
        run: |
          for repo in shopverse-frontend shopverse-backend; do
            aws ecr describe-repositories \
              --repository-names $repo \
              --region $AWS_REGION >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name $repo \
              --region $AWS_REGION
          done

      # Build frontend Docker image
      - name: Build frontend image
        run: |
          docker build \
            -t $ECR_REGISTRY/shopverse-frontend:${{ github.sha }} \
            -t $ECR_REGISTRY/shopverse-frontend:latest \
            ./frontend

      # Build backend Docker image
      - name: Build backend image
        run: |
          docker build \
            -t $ECR_REGISTRY/shopverse-backend:${{ github.sha }} \
            -t $ECR_REGISTRY/shopverse-backend:latest \
            ./backend

      # Push frontend image
      - name: Push frontend image
        run: |
          docker push $ECR_REGISTRY/shopverse-frontend:${{ github.sha }}
          docker push $ECR_REGISTRY/shopverse-frontend:latest

      # Push backend image
      - name: Push backend image
        run: |
          docker push $ECR_REGISTRY/shopverse-backend:${{ github.sha }}
          docker push $ECR_REGISTRY/shopverse-backend:latest

  # ======================================================
  # Stage 4 : Update GitOps (Helm values) & Trigger Deploy
  #
  # Purpose:
  # Update the Helm values in the included GitOps repository
  # so Argo CD (or other GitOps agent) picks up new image tags.
  #
  # This stage performs:
  # 1. Checkout repository
  # 2. Update `shopverse-gitops/helm/shopverse/values.yaml`
  #    with the newly pushed image tags
  # 3. Commit & push the change to `main`
  #
  # Note: This step uses the default `GITHUB_TOKEN` to push.
  # ======================================================

  update-gitops:
    name: Update GitOps
    runs-on: ubuntu-latest

    needs: build-and-push

    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Helm values with new image tags
        run: |
          VALUES_FILE=shopverse-gitops/helm/shopverse/values.yaml
          echo "Updating $VALUES_FILE"

          # Replace frontend image
          sed -i 's|image: ""  # frontend-image|image: "'$ECR_REGISTRY'/shopverse-frontend:'"$GITHUB_SHA"'"  # frontend-image|' "$VALUES_FILE"

          # Replace backend image
          sed -i 's|image: ""  # backend-image|image: "'$ECR_REGISTRY'/shopverse-backend:'"$GITHUB_SHA"'"  # backend-image|' "$VALUES_FILE"

      - name: Create GitOps Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci: update GitOps image tags to ${{ github.sha }}"
          branch: "ci/gitops-update-${{ github.sha }}"
          title: "CI: Update GitOps image tags to ${{ github.sha }}"
          body: "Automated image tag update from CI: ${{ github.sha }}"
          labels: automated,ci

      - name: Show changes
        run: |
          git --no-pager diff --name-only HEAD

  apply-ecr-secret:
    name: Apply ECR imagePullSecret (optional)
    runs-on: ubuntu-latest
    needs: update-gitops
    if: ${{ secrets.KUBE_CONFIG_DATA != '' }}
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          sudo apt-get update -y
          sudo apt-get install -y unzip
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup kubeconfig
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          kubectl config view
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Create shopverse namespace
        run: kubectl create namespace shopverse || true

      - name: Create ECR imagePullSecret
        run: |
          aws ecr get-login-password --region $AWS_REGION | kubectl create secret docker-registry ecr-registry-secret \
            --docker-server=$ECR_REGISTRY \
            --docker-username=AWS \
            --docker-password-stdin -n shopverse || echo "secret exists"




